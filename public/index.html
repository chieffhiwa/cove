<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#06091e" />
  <meta name="description" content="cove. something good is coming." />
  <title>cove.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(ellipse at 50% 42%, #3a2080 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, #1a0d40 0%, transparent 70%),
        linear-gradient(170deg, #08091f 0%, #0e0c30 50%, #160a3e 100%);
    }

    #content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 0;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(5rem, 18vw, 11rem);
      color: #cfefff;
      letter-spacing: -0.02em;
      line-height: 1;
      user-select: none;
    }

    .tagline {
      margin-top: 1.4rem;
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      font-weight: 300;
      color: rgba(207, 239, 255, 0.5);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .divider {
      margin: 2rem auto;
      width: 32px;
      height: 1px;
      background: rgba(207, 239, 255, 0.2);
    }

    .message {
      max-width: 380px;
      font-size: clamp(0.9rem, 2vw, 1rem);
      font-weight: 300;
      color: rgba(207, 239, 255, 0.58);
      line-height: 1.8;
    }

    .message strong {
      color: rgba(207, 239, 255, 0.85);
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="wordmark">cove.</div>
    <div class="tagline">something good is coming</div>
    <div class="divider"></div>
    <div class="message">
      we're taking in <strong>your feedback</strong> and building something that works for you.<br><br>
      your career. your current.<br><br>
      sit tight — we'll be back.
    </div>
  </div>
</body>
</html>
