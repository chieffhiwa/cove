<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="description" content="cove. something good is coming." />
  <title>cove.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-from: #180f3d;
      --bg-mid: #0d1b4b;
      --bg-to: #1a0533;
      --star-opacity: 1;
      --glow-color: rgba(147, 112, 219, 0.35);
      --text-primary: #f0eaff;
      --text-secondary: rgba(220, 210, 255, 0.65);
      --orb1: #2d1b69;
      --orb2: #0f2c5f;
      --scene: "night";
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #scene {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, var(--orb1) 0%, transparent 60%),
                  radial-gradient(ellipse at 30% 70%, var(--orb2) 0%, transparent 55%),
                  linear-gradient(160deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      transition: background 3s ease;
    }

    /* Stars — only visible at night / dusk */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: var(--star-opacity);
      transition: opacity 3s ease;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 4s) ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
    }

    @keyframes twinkle {
      from { opacity: var(--min-op, 0.2); transform: scale(1); }
      to   { opacity: var(--max-op, 0.9); transform: scale(1.3); }
    }

    /* Floating orbs / light blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      pointer-events: none;
      animation: drift linear infinite alternate;
    }

    .blob-1 {
      width: 420px; height: 420px;
      background: var(--blob1-color, #4b2d8a);
      top: -10%; left: -5%;
      animation-duration: 18s;
    }

    .blob-2 {
      width: 300px; height: 300px;
      background: var(--blob2-color, #0a2461);
      bottom: -5%; right: -5%;
      animation-duration: 22s;
    }

    .blob-3 {
      width: 200px; height: 200px;
      background: var(--blob3-color, #6b21a8);
      top: 40%; right: 15%;
      animation-duration: 15s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.05); }
      66%  { transform: translate(-15px, 25px) scale(0.97); }
      100% { transform: translate(20px, -10px) scale(1.03); }
    }

    /* Main content */
    #content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(4rem, 15vw, 9rem);
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 0 60px var(--glow-color), 0 0 120px var(--glow-color);
      animation: glow-pulse 6s ease-in-out infinite alternate;
      user-select: none;
    }

    @keyframes glow-pulse {
      from { text-shadow: 0 0 40px var(--glow-color), 0 0 80px var(--glow-color); }
      to   { text-shadow: 0 0 80px var(--glow-color), 0 0 160px var(--glow-color), 0 0 240px var(--glow-color); }
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .divider {
      margin: 2rem auto;
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--text-secondary), transparent);
    }

    .message {
      max-width: 400px;
      font-size: clamp(0.95rem, 2.2vw, 1.05rem);
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .message em {
      color: var(--text-primary);
      font-style: normal;
      font-weight: 500;
    }

    .time-label {
      margin-top: 3rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    /* Horizon line for dawn/dusk */
    #horizon {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0;
      pointer-events: none;
      z-index: 1;
      overflow: visible;
    }

    .horizon-glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      height: 200px;
      background: radial-gradient(ellipse at 50% 100%, var(--horizon-color, transparent) 0%, transparent 70%);
      opacity: var(--horizon-opacity, 0);
      transition: opacity 3s ease;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .blob-1 { width: 280px; height: 280px; }
      .blob-2 { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>

<div id="scene"></div>
<div id="stars"></div>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div id="horizon">
  <div class="horizon-glow"></div>
</div>

<div id="content">
  <div class="wordmark">cove.</div>
  <div class="tagline" id="time-tagline">something good is coming</div>
  <div class="divider"></div>
  <div class="message">
    we're taking in <em>your feedback</em>, rethinking a few things,
    and building something that actually feels right.<br><br>
    sit tight — we'll be back.
  </div>
  <div class="time-label" id="time-label"></div>
</div>

<script>
  (function () {
    const hour = new Date().getHours();

    // All scenes stay in midnight blue → purple spectrum, #cfefff for lightness
    const base = {
      textPrimary: '#cfefff',
      textSecondary: 'rgba(207, 239, 255, 0.55)',
      glowColor: 'rgba(140, 180, 255, 0.4)',
    };

    const themes = {
      night: {
        label: '🌙 late night hours',
        tagline: 'something good is coming',
        bgFrom: '#03081a', bgMid: '#08102e', bgTo: '#10083a',
        orb1: '#130a40', orb2: '#060e28',
        blob1: '#1a1060', blob2: '#0a0f35', blob3: '#2a1570',
        stars: true, horizonColor: 'transparent', horizonOpacity: 0,
        ...base
      },
      predawn: {
        label: '🌌 almost dawn',
        tagline: 'something good is coming',
        bgFrom: '#04091e', bgMid: '#0c0e38', bgTo: '#180d48',
        orb1: '#1a0f50', orb2: '#080e30',
        blob1: '#221265', blob2: '#0e0c3a', blob3: '#301878',
        stars: true, horizonColor: '#1a1060', horizonOpacity: 0.5,
        ...base
      },
      sunrise: {
        label: '🌅 early morning',
        tagline: 'a new day incoming',
        bgFrom: '#050a20', bgMid: '#0d1240', bgTo: '#1e0e55',
        orb1: '#1f1060', orb2: '#08102e',
        blob1: '#2a1575', blob2: '#0f1045', blob3: '#180d5a',
        stars: true, horizonColor: '#2a1575', horizonOpacity: 0.35,
        ...base
      },
      morning: {
        label: '☀️ morning',
        tagline: 'something good is coming',
        bgFrom: '#060c24', bgMid: '#0f183d', bgTo: '#1a1050',
        orb1: '#1e1260', orb2: '#0a1030',
        blob1: '#261870', blob2: '#101240', blob3: '#1e0f5a',
        stars: false, horizonColor: '#1e1260', horizonOpacity: 0.3,
        ...base
      },
      golden: {
        label: '✨ afternoon',
        tagline: 'something good is coming',
        bgFrom: '#050b22', bgMid: '#0e163a', bgTo: '#1c1255',
        orb1: '#221568', orb2: '#090f2e',
        blob1: '#2c1a78', blob2: '#111440', blob3: '#201060',
        stars: false, horizonColor: '#2c1a78', horizonOpacity: 0.25,
        ...base
      },
      sunset: {
        label: '🌇 evening',
        tagline: 'wrapping up for now',
        bgFrom: '#06092a', bgMid: '#100e45', bgTo: '#200d5e',
        orb1: '#251270', orb2: '#0a0c38',
        blob1: '#301880', blob2: '#130e4a', blob3: '#221268',
        stars: true, horizonColor: '#301880', horizonOpacity: 0.45,
        ...base
      },
      dusk: {
        label: '🌆 dusk',
        tagline: 'something good is coming',
        bgFrom: '#04081c', bgMid: '#0a0e38', bgTo: '#180c52',
        orb1: '#1e1060', orb2: '#080c2e',
        blob1: '#281568', blob2: '#100e40', blob3: '#1e0e58',
        stars: true, horizonColor: '#281568', horizonOpacity: 0.5,
        ...base
      }
    };

    function getScene(h) {
      if (h >= 22 || h < 4)  return 'night';
      if (h >= 4  && h < 6)  return 'predawn';
      if (h >= 6  && h < 9)  return 'sunrise';
      if (h >= 9  && h < 16) return 'morning';
      if (h >= 16 && h < 18) return 'golden';
      if (h >= 18 && h < 20) return 'sunset';
      return 'dusk';
    }

    const scene = getScene(hour);
    const t = themes[scene];

    const root = document.documentElement;
    root.style.setProperty('--bg-from', t.bgFrom);
    root.style.setProperty('--bg-mid', t.bgMid);
    root.style.setProperty('--bg-to', t.bgTo);
    root.style.setProperty('--orb1', t.orb1);
    root.style.setProperty('--orb2', t.orb2);
    root.style.setProperty('--blob1-color', t.blob1);
    root.style.setProperty('--blob2-color', t.blob2);
    root.style.setProperty('--blob3-color', t.blob3);
    root.style.setProperty('--glow-color', t.glowColor);
    root.style.setProperty('--text-primary', t.textPrimary);
    root.style.setProperty('--text-secondary', t.textSecondary);
    root.style.setProperty('--horizon-color', t.horizonColor);
    root.style.setProperty('--horizon-opacity', t.horizonOpacity);

    document.getElementById('time-label').textContent = t.label;
    document.getElementById('time-tagline').textContent = t.tagline;

    // Stars
    if (t.stars) {
      const container = document.getElementById('stars');
      const count = 90;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          top: ${Math.random() * 85}%;
          left: ${Math.random() * 100}%;
          --d: ${(Math.random() * 5 + 3).toFixed(1)}s;
          --delay: ${(Math.random() * 6).toFixed(1)}s;
          --min-op: ${(Math.random() * 0.2 + 0.05).toFixed(2)};
          --max-op: ${(Math.random() * 0.5 + 0.4).toFixed(2)};
        `;
        container.appendChild(s);
      }
    }
  })();
</script>
</body>
</html>
