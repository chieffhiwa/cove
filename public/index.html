<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a2a6c" />
  <meta name="description" content="cove. your career, your current." />
  <title>cove.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: linear-gradient(155deg, #1c2f7a 0%, #1a1d6e 35%, #2a1760 65%, #1e1255 100%);
    }

    #content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(4.5rem, 16vw, 10rem);
      color: #cfefff;
      letter-spacing: -0.02em;
      line-height: 1;
      user-select: none;
    }

    .tagline {
      margin-top: 0.75rem;
      font-size: clamp(0.75rem, 1.8vw, 0.9rem);
      font-weight: 300;
      color: rgba(207, 239, 255, 0.5);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .divider {
      margin: 2.5rem auto;
      width: 28px;
      height: 1px;
      background: rgba(207, 239, 255, 0.2);
    }

    .message {
      max-width: 420px;
      font-size: clamp(0.88rem, 2vw, 0.98rem);
      font-weight: 300;
      color: rgba(207, 239, 255, 0.55);
      line-height: 1.85;
    }

    .message strong {
      color: rgba(207, 239, 255, 0.88);
      font-weight: 400;
    }

    .buttons {
      margin-top: 2.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.8;
      transform: translateY(-1px);
    }

    .btn-outline {
      color: rgba(207, 239, 255, 0.75);
      border: 1px solid rgba(207, 239, 255, 0.2);
      background: transparent;
    }

    .btn-solid {
      color: #1a1d6e;
      background: #cfefff;
      border: 1px solid transparent;
    }

    .video-link {
      color: inherit;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
      font: inherit;
      padding: 0;
    }

    #video-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 12, 40, 0.85);
      z-index: 10;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    #video-modal.open {
      display: flex;
    }

    .video-modal-inner {
      position: relative;
      width: 100%;
      max-width: 720px;
    }

    .video-modal-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .video-modal-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-modal-close {
      position: absolute;
      top: -2.5rem;
      right: 0;
      background: none;
      border: none;
      color: rgba(207, 239, 255, 0.75);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.25rem;
    }

    .video-modal-close:hover {
      color: #cfefff;
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="wordmark">🌊 cove</div>
    <div class="tagline">your career. your current.</div>
    <div class="divider"></div>
    <div class="message">
      we're taking a step back, incorporating <strong>your feedback</strong>,
      and building something even more valuable to new and returning
      job seekers.<br><br>
      we <button type="button" class="video-link" onclick="openVideoModal()">can't hardly wait</button> 🎵
    </div>
    <div class="buttons">
      <a class="btn btn-outline" href="https://github.com/chieffhiwa/cove" target="_blank" rel="noopener">↗ view on github</a>
      <a class="btn btn-solid" href="https://github.com/sponsors/chieffhiwa" target="_blank" rel="noopener">♥ sponsor</a>
      <a class="btn btn-outline" href="https://bowdoin-cove.vercel.app/" target="_blank" rel="noopener">🐻‍❄️ cove for your campus</a>
    </div>
  </div>

  <div id="video-modal" onclick="if (event.target === this) closeVideoModal()">
    <div class="video-modal-inner">
      <button type="button" class="video-modal-close" onclick="closeVideoModal()" aria-label="Close video">✕</button>
      <div class="video-modal-frame" id="video-modal-frame"></div>
    </div>
  </div>

  <script>
    var VIDEO_ID = 'EvGjAYH-Nq4';

    function openVideoModal() {
      var frame = document.getElementById('video-modal-frame');
      var iframe = document.createElement('iframe');
      iframe.src = 'https://www.youtube.com/embed/' + VIDEO_ID + '?autoplay=1';
      iframe.title = 'cove video';
      iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
      iframe.allowFullscreen = true;
      frame.innerHTML = '';
      frame.appendChild(iframe);
      document.getElementById('video-modal').classList.add('open');
    }

    function closeVideoModal() {
      document.getElementById('video-modal').classList.remove('open');
      document.getElementById('video-modal-frame').innerHTML = '';
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeVideoModal();
    });
  </script>
</body>
</html>
